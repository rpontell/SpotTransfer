app = "spottransfer"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[build.args]
  VITE_API_URL = "/api"

[env]
  PORT = "8080"
  SPOTIFY_MARKET = "IT"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
